<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --accent: #4f7cff;
    --accent2: #00d4aa;
    --text: #f0f2ff;
    --muted: #8892b0;
    --danger: #ff6b6b;
    --success: #00d4aa;
    --warning: #ffa94d;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* TOP NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .nav-brand span { color: var(--text); font-weight: 400; }
  .nav-info { font-size: 13px; color: var(--muted); }

  /* MAIN */
  main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px; height: 100%;
    background: var(--accent-color, var(--accent));
    border-radius: 0 12px 12px 0;
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--text); }

  /* TOOLBAR */
  .toolbar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  input[type="text"], select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 8px 40px 8px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  select { padding: 8px 14px; }
  input[type="text"]:focus, select:focus { border-color: var(--accent); }

  /* TABLE */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .table-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-title { font-size: 15px; font-weight: 600; }
  .table-count { font-size: 13px; color: var(--muted); background: var(--surface2); padding: 3px 10px; border-radius: 99px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead tr { background: var(--surface2); }
  th {
    padding: 12px 16px;
    text-align: right;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  th:hover { color: var(--text); }
  td {
    padding: 13px 16px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* BADGES */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 99px;
    letter-spacing: 0.3px;
  }
  .badge-active { background: rgba(0,212,170,0.15); color: var(--success); }
  .badge-inactive { background: rgba(255,107,107,0.15); color: var(--danger); }
  .badge-shift { background: rgba(79,124,255,0.15); color: var(--accent); }

  /* AVATAR */
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
    margin-left: 10px;
    vertical-align: middle;
    flex-shrink: 0;
  }
  .name-cell { display: flex; align-items: center; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    font-size: 15px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 4rem; color: var(--muted); font-size: 15px; }

  /* FOOTER */
  .table-footer {
    padding: 0.75rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ERROR */
  .error-banner {
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 8px;
    padding: 1rem 1.5rem;
    color: var(--danger);
    font-size: 14px;
    margin-bottom: 1.5rem;
    display: none;
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">Operations <span>Dashboard</span></div>
  <div class="nav-info" id="lastSync">جاري التحميل...</div>
</nav>

<main>
  <div class="error-banner" id="errorBanner"></div>

  <div class="stats">
    <div class="stat" style="--accent-color: #4f7cff">
      <div class="stat-label">إجمالي الموظفين</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat" style="--accent-color: #00d4aa">
      <div class="stat-label">نشط</div>
      <div class="stat-value" id="statActive">—</div>
    </div>
    <div class="stat" style="--accent-color: #ff6b6b">
      <div class="stat-label">غير نشط</div>
      <div class="stat-value" id="statInactive">—</div>
    </div>
    <div class="stat" style="--accent-color: #ffa94d">
      <div class="stat-label">المشاريع</div>
      <div class="stat-value" id="statProjects">—</div>
    </div>
    <div class="stat" style="--accent-color: #cc5de8">
      <div class="stat-label">المواقع</div>
      <div class="stat-value" id="statLocations">—</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="ابحث بالاسم أو الرقم القومي..." oninput="applyFilters()">
    </div>
    <select id="shiftFilter" onchange="applyFilters()">
      <option value="">كل الشيفتات</option>
    </select>
    <select id="projectFilter" onchange="applyFilters()">
      <option value="">كل المشاريع</option>
    </select>
    <select id="statusFilter" onchange="applyFilters()">
      <option value="">كل الحالات</option>
      <option value="active">نشط</option>
      <option value="inactive">غير نشط</option>
    </select>
    <button class="btn-ghost" onclick="loadData()">↻ تحديث</button>
  </div>

  <div class="table-card">
    <div class="table-header">
      <span class="table-title">بيانات الموظفين</span>
      <span class="table-count" id="rowCount">—</span>
    </div>
    <div class="table-wrap">
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
        جاري تحميل البيانات...
      </div>
      <table id="empTable" style="display:none">
        <thead>
          <tr>
            <th onclick="sortBy('national_id')">الرقم القومي ↕</th>
            <th onclick="sortBy('name')">الاسم ↕</th>
            <th onclick="sortBy('shift')">الشيفت ↕</th>
            <th onclick="sortBy('project')">المشروع ↕</th>
            <th onclick="sortBy('role')">الدور ↕</th>
            <th onclick="sortBy('status')">الحالة ↕</th>
            <th onclick="sortBy('location')">الموقع ↕</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty" id="emptyState" style="display:none">لا توجد نتائج مطابقة</div>
    </div>
    <div class="table-footer">
      <span id="footerInfo">—</span>
      <span id="footerTime">—</span>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://dibhtnnkhakcygzpenwg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpYmh0bm5raGFrY3lnenBlbndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MjIxMTYsImV4cCI6MjA5NzM5ODExNn0.XUHnSsMV4nY3lknsVms_BjhAoEf2Riy0jDAdoezfszo';
  const TABLE = 'employees';

  let allData = [];
  let sortCol = '';
  let sortAsc = true;

  async function loadData() {
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('empTable').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('errorBanner').style.display = 'none';
    document.getElementById('lastSync').textContent = 'جاري التحميل...';

    try {
      // تم تعديل هذا السطر وإضافة .asc بعد name لتجنب خطأ 400
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=name.asc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });

      if (!res.ok) throw new Error(`خطأ ${res.status}: ${res.statusText}`);

      allData = await res.json();
      populateFilters();
      applyFilters();

      const now = new Date();
      document.getElementById('lastSync').textContent = `آخر تحديث: ${now.toLocaleTimeString('ar-EG')}`;

    } catch (err) {
      document.getElementById('loadingState').style.display = 'none';
      const banner = document.getElementById('errorBanner');
      banner.style.display = 'block';
      banner.textContent = 'تعذر تحميل البيانات: ' + err.message;
      document.getElementById('lastSync').textContent = 'فشل التحميل';
    }
  }

  function populateFilters() {
    const shifts = [...new Set(allData.map(r => r.shift).filter(Boolean))].sort();
    const projects = [...new Set(allData.map(r => r.project).filter(Boolean))].sort();

    const shiftSel = document.getElementById('shiftFilter');
    shiftSel.innerHTML = '<option value="">كل الشيفتات</option>';
    shifts.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; shiftSel.appendChild(o); });

    const projSel = document.getElementById('projectFilter');
    projSel.innerHTML = '<option value="">كل المشاريع</option>';
    projects.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; projSel.appendChild(o); });
  }

  function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const shift = document.getElementById('shiftFilter').value;
    const project = document.getElementById('projectFilter').value;
    const status = document.getElementById('statusFilter').value;

    let data = allData.filter(r => {
      const matchSearch = !search ||
        (r.name || '').toLowerCase().includes(search) ||
        (r.national_id || '').toString().includes(search);
      const matchShift = !shift || r.shift === shift;
      const matchProject = !project || r.project === project;
      const matchStatus = !status ||
        (status === 'active' && isActive(r.status)) ||
        (status === 'inactive' && !isActive(r.status));
      return matchSearch && matchShift && matchProject && matchStatus;
    });

    if (sortCol) {
      data.sort((a, b) => {
        const va = (a[sortCol] || '').toString();
        const vb = (b[sortCol] || '').toString();
        return sortAsc ? va.localeCompare(vb, 'ar') : vb.localeCompare(va, 'ar');
      });
    }

    updateStats(data);
    renderTable(data);
  }

  function isActive(status) {
    if (!status) return false;
    const s = status.toLowerCase();
    return s.includes('active') || s.includes('نشط');
  }

  function updateStats(filtered) {
    document.getElementById('statTotal').textContent = allData.length;
    document.getElementById('statActive').textContent = allData.filter(r => isActive(r.status)).length;
    document.getElementById('statInactive').textContent = allData.filter(r => !isActive(r.status)).length;
    document.getElementById('statProjects').textContent = new Set(allData.map(r => r.project).filter(Boolean)).size;
    document.getElementById('statLocations').textContent = new Set(allData.map(r => r.location).filter(Boolean)).size;
    document.getElementById('rowCount').textContent = filtered.length + ' موظف';
    document.getElementById('footerInfo').textContent = `عرض ${filtered.length} من ${allData.length} موظف`;
    document.getElementById('footerTime').textContent = new Date().toLocaleDateString('ar-EG');
  }

  function renderTable(data) {
    document.getElementById('loadingState').style.display = 'none';

    if (data.length === 0) {
      document.getElementById('empTable').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('empTable').style.display = 'table';

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = data.map(r => {
      const initials = (r.name || '?').split(' ').map(w => w[0]).slice(0, 2).join('');
      const active = isActive(r.status);
      return `<tr>
        <td style="font-family: monospace; color: var(--muted); font-size: 13px">${r.national_id || '—'}</td>
        <td>
          <div class="name-cell">
            <div class="avatar">${initials}</div>
            <span>${r.name || '—'}</span>
          </div>
        </td>
        <td><span class="badge badge-shift">${r.shift || '—'}</span></td>
        <td>${r.project || '—'}</td>
        <td style="color: var(--muted)">${r.role || '—'}</td>
        <td><span class="badge ${active ? 'badge-active' : 'badge-inactive'}">${r.status || '—'}</span></td>
        <td style="color: var(--muted)">${r.location || '—'}</td>
      </tr>`;
    }).join('');
  }

  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    applyFilters();
  }

  loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
